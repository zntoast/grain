<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>提示词管理 — 工作空间</title>
<style>
:root {
  --bg: oklch(99% 0.002 240);
  --surface: oklch(100% 0 0);
  --fg: oklch(18% 0.012 250);
  --muted: oklch(54% 0.012 250);
  --border: oklch(92% 0.005 250);
  --accent: oklch(58% 0.18 255);
  --accent-soft: oklch(58% 0.18 255 / 0.08);
  --accent-mid: oklch(58% 0.18 255 / 0.5);
  --radius: 12px;
  --radius-sm: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'SF Mono', ui-monospace, 'JetBrains Mono', Menlo, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font: 14px/1.5 var(--font);
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  display: flex;
}
.sidebar {
  width: 260px; flex-shrink: 0; background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0;
}
.sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
.sidebar-header h1 {
  font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
  display: flex; align-items: center; gap: 8px;
}
.sidebar-nav { flex: 1; overflow-y: auto; padding: 4px 0; }
.nav-section-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--muted); padding: 16px 16px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; margin: 1px 8px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13px; color: var(--fg); text-decoration: none;
  transition: background 0.12s;
}
.nav-item:hover { background: var(--accent-soft); }
.nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
.nav-item .count { margin-left: auto; color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
.nav-item svg { flex-shrink: 0; opacity: 0.6; }
.nav-item.active svg { opacity: 1; }

/* Tree sidebar */
.nav-folder {}
.nav-folder-header {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 16px 3px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
  color: var(--muted); cursor: pointer; user-select: none; text-transform: uppercase;
}
.nav-folder-header:hover { color: var(--fg); }
.nav-folder-header .arr {
  font-size: 8px; transition: transform 0.15s; flex-shrink: 0; width: 12px; text-align: center;
  font-family: monospace;
}
.nav-folder.open .nav-folder-header .arr { transform: rotate(90deg); }
.nav-folder-header .ficon { flex-shrink: 0; opacity: 0.5; }
.nav-folder.open .nav-folder-header .ficon { opacity: 0.8; }
.nav-folder-children { display: none; }
.nav-folder.open > .nav-folder-children { display: block; }
.nav-leaf {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 16px 5px 34px; font-size: 13px; color: var(--fg);
  text-decoration: none; transition: background 0.12s;
  border-radius: 6px; margin: 0 6px;
}
.nav-leaf:hover { background: var(--accent-soft); }
.nav-leaf.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
.nav-leaf .count { margin-left: auto; color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
.nav-leaf svg { flex-shrink: 0; opacity: 0.5; width: 14px; height: 14px; }
.nav-leaf.active svg { opacity: 1; }

/* Folder inline rename */
.folder-leaf .fname {
  flex: 1; cursor: text; padding: 1px 4px; border-radius: 4px;
  transition: background 0.12s; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.folder-leaf .fname:hover { background: var(--accent-soft); }
.folder-leaf .fname-input {
  flex: 1; font: inherit; font-size: 12px; font-weight: 600;
  background: var(--surface); border: 1px solid var(--accent); border-radius: 4px;
  padding: 2px 6px; outline: none; color: var(--fg); min-width: 0; height: 22px;
}
.inline-create { padding: 4px 16px !important; }
.inline-create input {
  width: 100%; font: inherit; font-size: 12px;
  background: var(--surface); border: 1px solid var(--accent); border-radius: 4px;
  padding: 4px 8px; outline: none; color: var(--fg);
}
.folder-leaf .folder-actions .rename-btn { opacity: 0.3; }
.folder-leaf:hover .folder-actions .rename-btn { opacity: 0.7; }
.folder-leaf .folder-actions .rename-btn:hover { opacity: 1; color: var(--accent); }

/* Sidebar popout */
.sidebar { transition: transform 0.2s ease; z-index: 1001; }
.sidebar.collapsed { transform: translateX(-100%); position: fixed; left: 0; top: 0; height: 100vh; }
.sidebar.collapsed.no-trans { transition: none; }
.sidebar-toggle {
  width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer;
  display: grid; place-items: center; flex-shrink: 0; margin-left: auto;
  transition: background 0.12s;
}
.sidebar-toggle:hover { background: var(--accent-soft); color: var(--accent); }
.sidebar-backdrop {
  display: none; position: fixed; inset: 0; background: oklch(0% 0 0 / 0.35);
  z-index: 1000;
}
.sidebar-backdrop.open { display: block; }
.sidebar-peek {
  display: none; position: fixed; left: 0; top: 50%; transform: translateY(-50%);
  width: 28px; height: 60px; border-radius: 0 8px 8px 0;
  background: var(--surface); border: 1px solid var(--border); border-left: none;
  color: var(--muted); cursor: pointer; z-index: 999;
  place-items: center; font-size: 14px; transition: color 0.12s;
}
.sidebar-peek:hover { color: var(--accent); }
.sidebar.collapsed ~ .sidebar-peek { display: grid; }
body.sidebar-locked .sidebar { position: fixed; left: 0; top: 0; height: 100vh; transform: translateX(0); }
body.sidebar-locked .sidebar-backdrop { display: block; }

.sidebar-footer {
  padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px;
}
.btn-icon {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer;
  display: grid; place-items: center; transition: background 0.12s;
}
.btn-icon:hover { background: var(--accent-soft); color: var(--accent); }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar {
  height: 56px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; padding: 0 24px;
  background: var(--surface); flex-shrink: 0;
}
.topbar h2 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
.search-box {
  margin-left: auto; display: flex; align-items: center; gap: 8px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 0 12px; width: 240px; height: 34px;
}
.search-box svg { flex-shrink: 0; opacity: 0.4; }
.search-box input {
  border: none; background: transparent; font: 13px var(--font);
  color: var(--fg); outline: none; flex: 1; min-width: 0;
}
.search-box input::placeholder { color: var(--muted); }
.topbar-actions { display: flex; gap: 6px; }
.content { flex: 1; overflow-y: auto; padding: 24px; }
.page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
.page-header-left h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.3; }
.page-header-left p { color: var(--muted); font-size: 13px; margin-top: 4px; }

.btn-primary {
  display: inline-flex; align-items: center; gap: 6px; height: 36px; padding: 0 18px;
  border-radius: 8px; border: none; background: var(--accent); color: #fff;
  font: 500 13px var(--font); cursor: pointer; transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-secondary {
  display: inline-flex; align-items: center; gap: 6px; height: 36px; padding: 0 18px;
  border-radius: 8px; border: 1px solid var(--border); background: var(--surface);
  color: var(--fg); font: 500 13px var(--font); cursor: pointer; transition: background 0.12s;
}
.btn-secondary:hover { background: var(--accent-soft); }
.btn-danger-sm {
  display: inline-flex; align-items: center; gap: 4px; height: 28px; padding: 0 10px;
  border-radius: 6px; border: 1px solid oklch(58% 0.2 30 / 0.2); background: transparent;
  color: oklch(58% 0.2 30); font: 500 11px var(--font); cursor: pointer; transition: background 0.12s;
}
.btn-danger-sm:hover { background: oklch(58% 0.2 30 / 0.08); }

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.stat-card .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.stat-card .stat-value { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }

/* Group sections */
.group-section { margin-bottom: 28px; }
.group-section-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
}
.group-section-header h3 {
  font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px;
}
.type-badge {
  font-size: 11px; padding: 2px 10px; border-radius: 99px; font-weight: 500;
}
.type-positive { background: oklch(58% 0.16 145 / 0.12); color: oklch(48% 0.16 145); }
.type-negative { background: oklch(58% 0.2 30 / 0.12); color: oklch(48% 0.2 30); }

.group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 14px; }
.group-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; transition: box-shadow 0.15s;
}
.group-card:hover { box-shadow: 0 2px 12px oklch(0% 0 0 / 0.06); }
.group-card-head {
  padding: 16px 18px 0; display: flex; justify-content: space-between; align-items: flex-start;
}
.group-card-head-left { display: flex; align-items: center; gap: 8px; }
.group-card h4 { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
.group-card .tag-count {
  font-size: 12px; font-variant-numeric: tabular-nums; color: var(--muted);
  background: var(--bg); padding: 2px 10px; border-radius: 99px;
}
.group-card .group-desc { font-size: 12px; color: var(--muted); padding: 6px 18px 0; line-height: 1.4; }

.group-content-box {
  margin: 12px 18px 0; border: 1px solid var(--border); border-radius: var(--radius-sm);
  overflow: hidden;
}
.group-content-box .content-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; background: var(--bg); border-bottom: 1px solid var(--border);
  font-size: 11px; color: var(--muted);
}
.group-content-box .content-header .copy-btn {
  background: none; border: none; color: var(--accent); cursor: pointer;
  font: 11px var(--font); padding: 2px 6px; border-radius: 4px;
}
.group-content-box .content-header .copy-btn:hover { background: var(--accent-soft); }
.group-content-box textarea {
  width: 100%; min-height: 100px; max-height: 260px;
  border: none; padding: 10px 12px;
  font: 12px/1.6 var(--font-mono); color: var(--fg);
  background: var(--surface); resize: vertical;
  outline: none;
}
.group-card-actions {
  padding: 12px 18px; display: flex; justify-content: space-between;
  align-items: center; border-top: 1px solid var(--border); margin-top: 12px;
}
.group-card-actions .left { display: flex; gap: 4px; }
.type-toggle {
  display: inline-flex; gap: 2px; padding: 2px; border-radius: 6px;
  background: var(--bg); border: 1px solid var(--border);
}
.type-toggle button {
  padding: 2px 10px; border: none; border-radius: 4px;
  font: 11px var(--font); cursor: pointer; transition: all 0.12s;
  background: transparent; color: var(--muted);
}
.type-toggle button.active-pos {
  background: oklch(58% 0.16 145 / 0.12); color: oklch(48% 0.16 145); font-weight: 500;
}
.type-toggle button.active-neg {
  background: oklch(58% 0.2 30 / 0.12); color: oklch(48% 0.2 30); font-weight: 500;
}

/* Empty state */
.empty-state {
  grid-column: 1 / -1; background: var(--surface);
  border: 1px dashed var(--border); border-radius: var(--radius);
  padding: 40px; text-align: center;
}
.empty-state p { color: var(--muted); font-size: 13px; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: oklch(0% 0 0 / 0.4);
  z-index: 2000; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius);
  width: 520px; max-height: 80vh; overflow: hidden;
  box-shadow: 0 20px 60px oklch(0% 0 0 / 0.2);
}
.modal-header { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: center; }
.modal-header h3 { font-size: 16px; font-weight: 600; }
.modal-close {
  width: 32px; height: 32px; border: none; background: transparent;
  color: var(--muted); cursor: pointer; border-radius: 8px; display: grid; place-items: center;
  font-size: 18px;
}
.modal-close:hover { background: var(--accent-soft); }
.modal-body { padding: 20px 24px; overflow-y: auto; max-height: calc(80vh - 80px); }
.modal-group-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); margin-bottom: 8px;
  cursor: pointer; transition: background 0.12s;
}
.modal-group-item:hover { background: var(--accent-soft); }
.modal-group-item .info { flex: 1; }
.modal-group-item .info h4 { font-size: 13px; font-weight: 500; }
.modal-group-item .info p { font-size: 11px; color: var(--muted); }
.modal-group-item .check {
  width: 20px; height: 20px; border-radius: 4px; border: 2px solid var(--border);
  display: grid; place-items: center; flex-shrink: 0;
}
.modal-group-item.selected .check { background: var(--accent); border-color: var(--accent); }
.modal-group-item.selected .check::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 700; }
.modal-footer { padding: 12px 24px 20px; display: flex; gap: 8px; justify-content: flex-end; align-items: center; }

/* Type selector in modal */
.modal-type-row {
  display: flex; align-items: center; gap: 12px; margin-top: 16px; padding-top: 14px;
  border-top: 1px solid var(--border);
}
.modal-type-row label { font-size: 13px; font-weight: 500; }
.modal-type-options { display: flex; gap: 4px; }
.modal-type-btn {
  padding: 5px 16px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--muted); font: 12px var(--font);
  cursor: pointer; transition: all 0.12s;
}
.modal-type-btn:hover { border-color: var(--accent-mid); color: var(--fg); }
.modal-type-btn.active-pos {
  background: oklch(58% 0.16 145 / 0.12);
  border-color: oklch(58% 0.16 145 / 0.3);
  color: oklch(48% 0.16 145);
  font-weight: 500;
}
.modal-type-btn.active-neg {
  background: oklch(58% 0.2 30 / 0.12);
  border-color: oklch(58% 0.2 30 / 0.3);
  color: oklch(48% 0.2 30);
  font-weight: 500;
}

/* Workspace tabs */
.workspace-tabs {
  display: flex; align-items: center; gap: 4px; padding: 0 24px; height: 44px;
  background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.ws-tab {
  display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 14px;
  border-radius: 6px 6px 0 0; font: 13px var(--font); color: var(--muted);
  background: transparent; border: none; cursor: pointer; transition: background 0.12s;
  position: relative; white-space: nowrap;
}
.ws-tab:hover { background: var(--accent-soft); color: var(--fg); }
.ws-tab.active { color: var(--fg); font-weight: 500; background: var(--bg); }
.ws-tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px;
  background: var(--accent); border-radius: 1px 1px 0 0;
}
.ws-tab .ws-close {
  width: 16px; height: 16px; border-radius: 4px; border: none; background: transparent;
  color: var(--muted); font-size: 12px; cursor: pointer; display: grid; place-items: center;
  opacity: 0; transition: opacity 0.12s;
}
.ws-tab:hover .ws-close { opacity: 1; }
.ws-tab .ws-close:hover { background: oklch(58% 0.2 30 / 0.12); color: oklch(58% 0.2 30); }
.ws-add-tab {
  width: 32px; height: 32px; border-radius: 6px; border: 1px dashed var(--border);
  background: transparent; color: var(--muted); cursor: pointer; font-size: 16px;
  display: grid; place-items: center; transition: background 0.12s; flex-shrink: 0; margin-left: 4px;
}
.ws-add-tab:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-mid); }
.ws-tab .ws-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}

/* Create ws modal */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--fg); margin-bottom: 4px; }
.form-group input, .form-group textarea {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font: 13px var(--font); color: var(--fg); background: var(--bg); outline: none; transition: border-color 0.12s;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group textarea { resize: vertical; min-height: 70px; }
.form-hint { font-size: 11px; color: var(--muted); margin-top: 3px; }
.pill { font-size: 11px; padding: 2px 8px; border-radius: 99px; background: var(--accent-soft); color: var(--accent); }

/* View tabs */
.view-tabs {
  display: flex; gap: 2px; margin-bottom: 24px; padding: 2px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; width: fit-content;
}
.view-tab {
  padding: 7px 18px; border-radius: 8px; border: none;
  font: 13px/1 var(--font); cursor: pointer;
  background: transparent; color: var(--muted);
  transition: all 0.12s;
}
.view-tab:hover { color: var(--fg); }
.view-tab.active { background: var(--accent); color: #fff; font-weight: 500; }

/* All tags grid */
.all-tags-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.all-tag-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 99px;
  background: var(--surface); border: 1px solid var(--border);
  font: 13px var(--font-mono); color: var(--fg);
  transition: box-shadow 0.12s;
}
.all-tag-chip:hover { box-shadow: 0 2px 8px oklch(0% 0 0 / 0.06); border-color: var(--accent-mid); }
.all-tag-chip .tag-en { font-weight: 600; }
.all-tag-chip .tag-zh {
  font-family: var(--font);
  font-size: 11px; color: var(--muted);
  margin-left: 2px;
}
.all-tags-section { margin-bottom: 32px; }
.all-tags-section h3 {
  font-size: 14px; font-weight: 600; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}

/* Folder management */
.nav-folder-header .folder-actions {
  margin-left: auto; display: flex; gap: 2px; opacity: 0; transition: opacity 0.12s;
}
.nav-folder-header:hover .folder-actions { opacity: 1; }
.folder-action-btn {
  width: 22px; height: 22px; border-radius: 4px; border: none; background: transparent;
  color: var(--muted); cursor: pointer; display: grid; place-items: center;
  font-size: 14px; line-height: 1; transition: background 0.12s;
}
.folder-action-btn:hover { background: var(--accent-soft); color: var(--accent); }
.folder-action-btn.danger:hover { color: oklch(58% 0.2 30); background: oklch(58% 0.2 30 / 0.08); }
.folder-leaf {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 16px 4px 34px; margin: 1px 6px; border-radius: 6px;
  font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer;
  user-select: none; transition: background 0.12s;
}
.folder-leaf:hover { background: var(--accent-soft); color: var(--fg); }
.folder-leaf .arr { font-size: 8px; transition: transform 0.15s; font-family: monospace; width: 10px; text-align: center; flex-shrink: 0; }
.folder-leaf.open .arr { transform: rotate(90deg); }
.folder-leaf .fname { flex: 1; }
.folder-leaf .folder-actions { display: flex; gap: 1px; opacity: 0; transition: opacity 0.12s; }
.folder-leaf:hover .folder-actions { opacity: 1; }
.folder-children { display: none; }
.folder-leaf.open + .folder-children { display: block; }

/* Word-group highlight */
.word-group {
  transition: background 0.15s, box-shadow 0.15s;
  border-radius: 3px;
  padding: 0 2px;
}
.word-group.highlight {
  background: oklch(58% 0.18 255 / 0.15);
  box-shadow: 0 0 0 1px oklch(58% 0.18 255 / 0.3);
}

/* Drag & drop */
.group-card {
  cursor: default;
  transition: box-shadow 0.15s, opacity 0.15s, transform 0.15s;
}
.group-card.dragging {
  opacity: 0.4;
  transform: scale(0.97);
}
.group-card.drag-over {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-soft);
}
.group-card.drag-over-top {
  border-top: 3px solid var(--accent);
}
.group-card.drag-over-bottom {
  border-bottom: 3px solid var(--accent);
}
.group-card .drag-handle {
  cursor: grab;
  opacity: 0.3;
  transition: opacity 0.12s;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;

<script>
/* ===== Data ===== */
var ALL_GROUPS = [
  { id:'people',        name:'人物肖像',   desc:'角色、构图、姿势相关提示词，用于人物生成。', tags:'9', pills:['角色','构图'], color:'255' },
  { id:'product',       name:'产品摄影',   desc:'产品展示、电商场景等提示词。', tags:'6', pills:['画风','场景'], color:'170' },
  { id:'illustration', name:'插画风格',   desc:'水彩、扁平、像素、赛璐珞等插画风格提示词。', tags:'5', pills:['画风','光影'], color:'145' },
  { id:'architecture', name:'建筑空间',   desc:'建筑、街道、风景等空间类提示词。', tags:'6', pills:['场景','构图'], color:'45' },
  { id:'concept',      name:'概念艺术',   desc:'科幻、赛博朋克、艺术风格提示词。', tags:'5', pills:['画风','光影','色调'], color:'28' },
  { id:'anime',        name:'动漫风格',   desc:'日式动漫、二次元风格提示词。', tags:'5', pills:['画风','角色'], color:'300' },
  { id:'food',         name:'美食摄影',   desc:'美食拍摄、质感特写提示词。', tags:'7', pills:['构图','画质','场景'], color:'200' }
];

/* ===== Folder management ===== */
var GROUP_FOLDERS = [];
var GROUP_FOLDER_MAP = {};
var folderIdCounter = 10;

function loadFolders() {
  try {
    var d = JSON.parse(localStorage.getItem(WS_LS_KEY));
    if (d && d.folders) GROUP_FOLDERS = d.folders;
    if (d && d.folderMap) GROUP_FOLDER_MAP = d.folderMap;
    if (d && d.folderCounter) folderIdCounter = d.folderCounter;
  } catch(_) {}
}

function renderGroupSidebar() {
  var container = document.getElementById('groupSidebar');
  if (!container) return;
  var html = '';
  GROUP_FOLDERS.forEach(function(f) {
    html += '<div class="folder-leaf open">';
    html += '<span class="arr" onclick="toggleFolderChild(this.parentNode)">▶</span>';
    html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
    html += '<span class="fname" id="fname_' + f.id + '" onclick="event.stopPropagation();startRenameFolder(\'' + f.id + '\')" title="点击编辑名称">' + escapeHtml(f.name) + '</span>';
    html += '<span class="folder-actions">';
    html += '<button class="folder-action-btn" onclick="event.stopPropagation();openCreateGroupModal(\'' + f.id + '\')" title="在此目录下新建词组">+</button>';
    html += '<button class="folder-action-btn rename-btn" onclick="event.stopPropagation();startRenameFolder(\'' + f.id + '\')" title="重命名">✏️</button>';
    html += '<button class="folder-action-btn danger" onclick="event.stopPropagation();deleteFolder(\'' + f.id + '\')" title="删除目录">×</button>';
    html += '</span>';
    html += '</div>';
    html += '<div class="folder-children">';
    ALL_GROUPS.forEach(function(g) {
      if (GROUP_FOLDER_MAP[g.id] === f.id) {
        var count = (GROUP_TAGS[g.id] || []).length;
        html += '<a class="nav-leaf" href="group.html?id=' + g.id + '">';
        html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
        html += escapeHtml(g.name) + ' <span class="count">' + count + '</span></a>';
      }
    });
    html += '</div>';
  });
  ALL_GROUPS.forEach(function(g) {
    if (!GROUP_FOLDER_MAP[g.id]) {
      var count = (GROUP_TAGS[g.id] || []).length;
      html += '<a class="nav-leaf" href="group.html?id=' + g.id + '">';
      html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
      html += escapeHtml(g.name) + ' <span class="count">' + count + '</span></a>';
    }
  });
  if (_inlineCreatingFolder) {
    html += '<div class="nav-leaf inline-create">';
    html += '<input id="inlineFolderInput" placeholder="文件夹名称…" onkeydown="if(event.key===\'Enter\')confirmInlineCreateFolder();else if(event.key===\'Escape\')cancelInlineCreateFolder()" onblur="setTimeout(confirmInlineCreateFolder,150)" />';
    html += '</div>';
  }
  container.innerHTML = html;
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toggleFolderChild(el) { el.classList.toggle('open'); }

/* Folder inline rename */
var _renamingFolder = null;
var _inlineCreatingFolder = false;

function startRenameFolder(folderId) {
  var span = document.getElementById('fname_' + folderId);
  if (!span) return;
  if (_renamingFolder) cancelRenameFolder();
  _renamingFolder = folderId;
  var oldName = span.textContent;
  var input = document.createElement('input');
  input.className = 'fname-input';
  input.type = 'text';
  input.value = oldName;
  input.id = 'fname_input_' + folderId;
  input.onkeydown = function(e) {
    e.stopPropagation();
    if (e.key === 'Enter') { saveRenameFolder(folderId); }
    else if (e.key === 'Escape') { cancelRenameFolder(); }
  };
  input.onblur = function() { saveRenameFolder(folderId); };
  input.dataset.oldName = oldName;
  span.innerHTML = '';
  span.appendChild(input);
  input.focus();
  input.select();
}
function saveRenameFolder(folderId) {
  var input = document.getElementById('fname_input_' + folderId);
  if (!input || _renamingFolder !== folderId) return;
  var newName = input.value.trim();
  var oldName = input.dataset.oldName || '';
  _renamingFolder = null;
  if (newName && newName !== oldName) {
    GROUP_FOLDERS.forEach(function(f) {
      if (f.id === folderId) f.name = newName;
    });
    saveFolders();
  }
  renderGroupSidebar();
}
function cancelRenameFolder() {
  if (_renamingFolder) {
    _renamingFolder = null;
    renderGroupSidebar();
  }
}

function openCreateGroupModal(preSelectedFolder) {
  var sel = document.getElementById('newGroupFolder');
  sel.innerHTML = '<option value="">（无目录 — 放在根目录）</option>';
  GROUP_FOLDERS.forEach(function(f) {
    sel.innerHTML += '<option value="' + f.id + '">' + escapeHtml(f.name) + '</option>';
  });
  if (preSelectedFolder) sel.value = preSelectedFolder;
  document.getElementById('newGroupName').value = '';
  document.getElementById('newGroupName').focus();
  document.getElementById('createGroupModal').classList.add('open');
}
function confirmCreateGroup() {
  var name = document.getElementById('newGroupName').value.trim();
  if (!name) return;
  var folderId = document.getElementById('newGroupFolder').value || null;
  var id = name.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]+/g, '_').replace(/^_|_$/g, '') || 'group_' + Date.now();
  var base = id, n = 0;
  while (ALL_GROUPS.some(function(g) { return g.id === id; })) { n++; id = base + '_' + n; }
  var hue = String(Math.floor(Math.random() * 360));
  ALL_GROUPS.push({ id: id, name: name, color: hue, tags: '0', desc: '', pills: [] });
  if (folderId) GROUP_FOLDER_MAP[id] = folderId;
  if (!GROUP_TAGS[id]) GROUP_TAGS[id] = [];
  saveData();
  saveFolders();
  renderGroupSidebar();
  location.href = 'group.html?id=' + id;
}
function startInlineCreateFolder() {
  if (_inlineCreatingFolder) return;
  _inlineCreatingFolder = true;
  renderGroupSidebar();
  setTimeout(function() {
    var inp = document.getElementById('inlineFolderInput');
    if (inp) { inp.focus(); inp.select(); }
  }, 50);
}
function confirmInlineCreateFolder() {
  var input = document.getElementById('inlineFolderInput');
  if (!input) return;
  var name = input.value.trim();
  _inlineCreatingFolder = false;
  if (name) {
    var id = 'f' + (folderIdCounter++);
    GROUP_FOLDERS.push({ id: id, name: name });
    saveFolders();
  }
  renderGroupSidebar();
}
function cancelInlineCreateFolder() {
  _inlineCreatingFolder = false;
  renderGroupSidebar();
}
function deleteFolder(folderId) {
  if (!confirm('确认删除目录 "' + (GROUP_FOLDERS.find(function(f){return f.id===folderId})||{}).name + '"？目录下的词组将移至根目录。')) return;
  GROUP_FOLDERS = GROUP_FOLDERS.filter(function(f) { return f.id !== folderId; });
  for (var gid in GROUP_FOLDER_MAP) {
    if (GROUP_FOLDER_MAP[gid] === folderId) delete GROUP_FOLDER_MAP[gid];
  }
  saveFolders();
  renderGroupSidebar();
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

/* Shared tag data — loaded from localStorage (same key as all-tags.html) */
var WS_LS_KEY = 'pt_all_tags_data';

    if (saved.groupFolderMap) { GROUP_FOLDER_MAP = saved.groupFolderMap; }
  } else {

    GROUP_TAGS = {};

}

function migrateWsGroups() {
  var needsSave = false;
  Object.keys(wsGroups).forEach(function(wsId) {
    wsGroups[wsId] = (wsGroups[wsId] || []).map(function(entry) {
      if (typeof entry === 'string') {
        needsSave = true;
        return { groupId: entry, type: 'positive' };
      }
      if (!entry.type) {
        needsSave = true;
        entry.type = 'positive';
      }
      return entry;
    });
  });
  if (needsSave) saveData();
}

/* ===== Drag & drop reorder ===== */
var _dragGroupId = null, _dragType = null;

function dragStart(e) {
  var card = e.target.closest('.group-card');
  if (!card) return;
  _dragGroupId = card.dataset.groupId;
  _dragType = card.dataset.type;
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', _dragGroupId);
}

function dragEnd(e) {
  var card = e.target.closest('.group-card');
  if (card) card.classList.remove('dragging');
  document.querySelectorAll('.group-card.drag-over, .group-card.drag-over-top, .group-card.drag-over-bottom').forEach(function(el) {
    el.classList.remove('drag-over', 'drag-over-top', 'drag-over-bottom');
  });
  _dragGroupId = null;
  _dragType = null;
}

function dragOverCard(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var target = e.target.closest('.group-card');
  if (!target) return;
  if (target.dataset.groupId === _dragGroupId) return;
  if (target.dataset.type !== _dragType) return;
  target.classList.add('drag-over');
  var rect = target.getBoundingClientRect();
  var midY = rect.top + rect.height / 2;
  target.classList.toggle('drag-over-top', e.clientY < midY);
  target.classList.toggle('drag-over-bottom', e.clientY >= midY);
}

function dragLeaveCard(e) {
  var target = e.target.closest('.group-card');
  if (target) {
    target.classList.remove('drag-over', 'drag-over-top', 'drag-over-bottom');
  }
}

function dropOnCard(e) {
  e.preventDefault();
  var target = e.target.closest('.group-card');
  if (!target) return;
  var draggedId = _dragGroupId;
  var targetId = target.dataset.groupId;
  if (!draggedId || draggedId === targetId) return;
  var type = _dragType;
  if (target.dataset.type !== type) return;

  var entries = wsGroups[currentWsId];
  if (!entries) return;

  var draggedIdx = -1, targetIdx = -1;
  entries.forEach(function(entry, i) {
    if (entry.groupId === draggedId && entry.type === type) draggedIdx = i;
    if (entry.groupId === targetId && entry.type === type) targetIdx = i;
  });
  if (draggedIdx === -1 || targetIdx === -1) return;

  // Determine insertion position based on drop zone
  var rect = target.getBoundingClientRect();
  var midY = rect.top + rect.height / 2;
  var insertBefore = e.clientY < midY;

  // Remove dragged entry
  var draggedEntry = entries.splice(draggedIdx, 1)[0];

  // Recalculate targetIdx after removal
  targetIdx = -1;
  entries.forEach(function(entry, i) {
    if (entry.groupId === targetId && entry.type === type) targetIdx = i;
  });

  // Insert at correct position
  var insertAt = insertBefore ? targetIdx : targetIdx + 1;
  entries.splice(insertAt, 0, draggedEntry);

  saveData();
  renderCurrentWorkspace();
}

function setViewMode(mode) {
  viewMode = mode;
  renderCurrentWorkspace();
}

function typeLabel(type) {
  return type === 'positive' ? '正向提示词' : '负面提示词';
}

  entry.type = newType;

  renderCurrentWorkspace();
}

  openLinkModal();
}

function unlinkGroup(id) {
  if (!confirm('确定解除该组与此工作空间的关联？组本身和组内提示词不会被删除。')) return;
  wsGroups[currentWsId] = (wsGroups[currentWsId] || []).filter(function(e) { return e.groupId !== id; });
  saveData();
  renderCurrentWorkspace();
}

function openLinkModal() {
  linkModalType = 'positive';
  setLinkType('positive');
  var list = document.getElementById('modalGroupList');
  var linked = wsGroups[currentWsId] || [];
  var linkedIds = {};
  linked.forEach(function(e) { linkedIds[e.groupId] = true; });
  var html = '';
  ALL_GROUPS.forEach(function(g) {
    var selected = !!linkedIds[g.id];
    html += '<div class="modal-group-item' + (selected ? ' selected' : '') + '" data-group="' + g.id + '" onclick="toggleModalGroup(this)">';
    html += '  <div class="check"></div>';
    html += '  <div class="info">';
    html += '    <h4>' + g.name + '</h4>';
    html += '    <p>' + g.tags + ' 个提示词 · ' + (selected ? '已关联此工作空间' : '未关联') + '</p>';
    html += '  </div>';
    html += '</div>';
  });
  list.innerHTML = html;
  updateLinkCount();
  document.getElementById('linkModal').classList.add('open');
}

function closeLinkModal() {
  document.getElementById('linkModal').classList.remove('open');
}

function toggleModalGroup(el) {
  el.classList.toggle('selected');
  updateLinkCount();
}

function updateLinkCount() {
  var count = document.querySelectorAll('#modalGroupList .modal-group-item.selected').length;
  document.getElementById('linkCount').textContent = count;
}

function saveLinkModal() {
  var selected = document.querySelectorAll('#modalGroupList .modal-group-item.selected');
  var alreadyLinked = {};
  (wsGroups[currentWsId] || []).forEach(function(e) { alreadyLinked[e.groupId] = e.type; });
  wsGroups[currentWsId] = [];
  selected.forEach(function(el) {
    var gid = el.dataset.group;
    wsGroups[currentWsId].push({
      groupId: gid,
      type: alreadyLinked[gid] || linkModalType
    });
  });
  // Preserve type for groups that were already linked but unchecked
  Object.keys(alreadyLinked).forEach(function(gid) {
    var stillSelected = false;
    selected.forEach(function(el) { if (el.dataset.group === gid) stillSelected = true; });
    if (!stillSelected) {
      // Group was deselected - it's already removed from the array
    }
  });
  saveData();
  closeLinkModal();
  renderCurrentWorkspace();
}

/* ===== Sidebar ===== */
function toggleFolder(el) { el.parentElement.classList.toggle('open'); }
function toggleSidebar() {
  var s = document.querySelector('.sidebar');
  if (s.classList.contains('collapsed')) {
    openSidebarPopout();
  } else {
    closeSidebarPopout();
  }
}
function openSidebarPopout() {
  var s = document.querySelector('.sidebar');
  s.classList.remove('collapsed');
  document.body.classList.add('sidebar-locked');
}
function closeSidebarPopout() {
  var s = document.querySelector('.sidebar');
  s.classList.add('collapsed');
  s.classList.add('no-trans');
  document.body.classList.remove('sidebar-locked');
  try { localStorage.setItem('pm_sidebar_collapsed', '1'); } catch(e) {}
  setTimeout(function() { s.classList.remove('no-trans'); }, 50);
}

/* ===== Init ===== */
loadData();
loadFolders();
renderGroupSidebar();
if (!currentWsId) currentWsId = wsData[0].id;
renderTabs();
renderCurrentWorkspace();
try {
  var sbCollapsed = localStorage.getItem('pm_sidebar_collapsed') === '1';
  if (sbCollapsed) {
    document.querySelector('.sidebar').classList.add('collapsed');
  }
} catch(e) {}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeLinkModal(); closeCreateModal();
    closeSidebarPopout();
  }
});
</script>
</body>
</html>
