<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>提示词管理 — 全部提示词</title>
<style>
:root {
  --bg: oklch(99% 0.002 240);
  --surface: oklch(100% 0 0);
  --fg: oklch(18% 0.012 250);
  --muted: oklch(54% 0.012 250);
  --border: oklch(92% 0.005 250);
  --accent: oklch(58% 0.18 255);
  --accent-soft: oklch(58% 0.18 255 / 0.08);
  --accent-mid: oklch(58% 0.18 255 / 0.5);
  --radius: 12px;
  --radius-sm: 8px;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'SF Mono', ui-monospace, 'JetBrains Mono', Menlo, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font: 14px/1.5 var(--font);
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  display: flex;
}
.sidebar {
  width: 260px; flex-shrink: 0; background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0;
}
.sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); }
.sidebar-header h1 {
  font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
  display: flex; align-items: center; gap: 8px;
}
.sidebar-nav { flex: 1; overflow-y: auto; padding: 4px 0; }
.nav-section-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--muted); padding: 16px 16px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; margin: 1px 8px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13px; color: var(--fg); text-decoration: none;
  transition: background 0.12s;
}
.nav-item:hover { background: var(--accent-soft); }
.nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
.nav-item .count { margin-left: auto; color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
.nav-item svg { flex-shrink: 0; opacity: 0.6; }
.nav-item.active svg { opacity: 1; }

/* Tree sidebar */
.nav-folder {}
.nav-folder-header {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 16px 3px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
  color: var(--muted); cursor: pointer; user-select: none; text-transform: uppercase;
}
.nav-folder-header:hover { color: var(--fg); }
.nav-folder-header .arr {
  font-size: 8px; transition: transform 0.15s; flex-shrink: 0; width: 12px; text-align: center;
  font-family: monospace;
}
.nav-folder.open .nav-folder-header .arr { transform: rotate(90deg); }
.nav-folder-header .ficon { flex-shrink: 0; opacity: 0.5; }
.nav-folder.open .nav-folder-header .ficon { opacity: 0.8; }
.nav-folder-children { display: none; }
.nav-folder.open > .nav-folder-children { display: block; }
.nav-leaf {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 16px 5px 34px; font-size: 13px; color: var(--fg);
  text-decoration: none; transition: background 0.12s;
  border-radius: 6px; margin: 0 6px;
}
.nav-leaf:hover { background: var(--accent-soft); }
.nav-leaf.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
.nav-leaf .count { margin-left: auto; color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
.nav-leaf svg { flex-shrink: 0; opacity: 0.5; width: 14px; height: 14px; }
.nav-leaf.active svg { opacity: 1; }

/* Folder inline rename */
.folder-leaf .fname {
  flex: 1; cursor: text; padding: 1px 4px; border-radius: 4px;
  transition: background 0.12s; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.folder-leaf .fname:hover { background: var(--accent-soft); }
.folder-leaf .fname-input {
  flex: 1; font: inherit; font-size: 12px; font-weight: 600;
  background: var(--surface); border: 1px solid var(--accent); border-radius: 4px;
  padding: 2px 6px; outline: none; color: var(--fg); min-width: 0; height: 22px;
}
.folder-leaf .folder-actions .rename-btn { opacity: 0.3; }
.folder-leaf:hover .folder-actions .rename-btn { opacity: 0.7; }
.folder-leaf .folder-actions .rename-btn:hover { opacity: 1; color: var(--accent); }
.inline-create { padding: 4px 16px !important; }
.inline-create input {
  width: 100%; font: inherit; font-size: 12px;
  background: var(--surface); border: 1px solid var(--accent); border-radius: 4px;
  padding: 4px 8px; outline: none; color: var(--fg);
}

/* Sidebar popout */
.sidebar { transition: transform 0.2s ease; z-index: 1001; }
.sidebar.collapsed { transform: translateX(-100%); position: fixed; left: 0; top: 0; height: 100vh; }
.sidebar.collapsed.no-trans { transition: none; }
.sidebar-toggle {
  width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer;
  display: grid; place-items: center; flex-shrink: 0; margin-left: auto;
  transition: background 0.12s;
}
.sidebar-toggle:hover { background: var(--accent-soft); color: var(--accent); }
.sidebar-backdrop {
  display: none; position: fixed; inset: 0; background: oklch(0% 0 0 / 0.35);
  z-index: 1000;
}
.sidebar-backdrop.open { display: block; }
.sidebar-peek {
  display: none; position: fixed; left: 0; top: 50%; transform: translateY(-50%);
  width: 28px; height: 60px; border-radius: 0 8px 8px 0;
  background: var(--surface); border: 1px solid var(--border); border-left: none;
  color: var(--muted); cursor: pointer; z-index: 999;
  place-items: center; font-size: 14px; transition: color 0.12s;
}
.sidebar-peek:hover { color: var(--accent); }
.sidebar.collapsed ~ .sidebar-peek { display: grid; }
body.sidebar-locked .sidebar { position: fixed; left: 0; top: 0; height: 100vh; transform: translateX(0); }
body.sidebar-locked .sidebar-backdrop { display: block; }

.sidebar-footer {
  padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px;
}
.btn-icon {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); cursor: pointer;
  display: grid; place-items: center; transition: background 0.12s;
}
.btn-icon:hover { background: var(--accent-soft); color: var(--accent); }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar {
  height: 56px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; padding: 0 24px;
  background: var(--surface); flex-shrink: 0;
}
.topbar h2 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
.search-box {
  margin-left: auto; display: flex; align-items: center; gap: 8px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 0 12px; width: 240px; height: 34px;
}
.search-box svg { flex-shrink: 0; opacity: 0.4; }
.search-box input {
  border: none; background: transparent; font: 13px var(--font);
  color: var(--fg); outline: none; flex: 1; min-width: 0;
}
.search-box input::placeholder { color: var(--muted); }
.topbar-actions { display: flex; gap: 6px; }
.content { flex: 1; overflow-y: auto; padding: 24px; }
.page-header { margin-bottom: 20px; }
.page-header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.3; }
.page-header p { color: var(--muted); font-size: 13px; margin-top: 4px; }
.filter-bar { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
.filter-chip {
  font-size: 12px; padding: 4px 14px; border-radius: 99px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--muted); cursor: pointer; transition: all 0.12s;
}
.filter-chip:hover { border-color: var(--accent-mid); color: var(--fg); }
.filter-chip.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 500; }
.tag-grid {
  display: block;
}
.summary-bar {
  display: flex; gap: 24px; margin-bottom: 24px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 20px;
}
.summary-stat {}
.summary-stat .num { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; }
.summary-stat .label { font-size: 12px; color: var(--muted); margin-top: 2px; }

.btn-primary {
  display: inline-flex; align-items: center; gap: 6px; height: 36px; padding: 0 18px;
  border-radius: 8px; border: none; background: var(--accent); color: #fff;
  font: 500 13px var(--font); cursor: pointer; transition: opacity 0.15s;
}
.btn-primary:hover { opacity: 0.85; }
.btn-secondary {
  display: inline-flex; align-items: center; gap: 6px; height: 36px; padding: 0 18px;
  border-radius: 8px; border: 1px solid var(--border); background: var(--surface);
  color: var(--fg); font: 500 13px var(--font); cursor: pointer; transition: background 0.12s;
}
.btn-secondary:hover { background: var(--accent-soft); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: oklch(0% 0 0 / 0.4);
  display: none; align-items: center; justify-content: center;
  z-index: 2000; backdrop-filter: blur(2px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius);
  width: 520px; max-width: 90vw; max-height: 85vh; overflow-y: auto;
  padding: 28px 28px 20px; box-shadow: 0 20px 60px oklch(0% 0 0 / 0.2);
}
.modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
.modal p.desc { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
.modal-field { margin-bottom: 16px; }
.modal-field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
.modal-field textarea, .modal-field select {
  width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--fg); font: 13px var(--font-mono); padding: 10px 12px;
  outline: none; resize: vertical;
}
.modal-field textarea:focus, .modal-field select:focus { border-color: var(--accent); }
.modal-field textarea { min-height: 140px; font-size: 14px; line-height: 1.7; }
.modal-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.group-checkboxes { display: flex; flex-wrap: wrap; gap: 6px; }
.group-checkboxes label {
  font-size: 12px; padding: 4px 12px; border-radius: 99px;
  border: 1px solid var(--border); background: var(--bg);
  cursor: pointer; display: flex; align-items: center; gap: 4px;
  transition: border-color 0.12s;
}
.group-checkboxes label:hover { border-color: var(--accent-mid); }
.group-checkboxes input { margin: 0; }
.group-checkboxes label:has(input:checked) { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

/* Batch add modal */
.batch-preview { margin-top: 10px; }
.batch-preview .prev-chip {
  display: inline-block; font-family: var(--font-mono); font-size: 12px;
  padding: 3px 10px; border-radius: 99px; background: var(--accent-soft);
  color: var(--accent); margin: 3px;
}
.batch-count { font-size: 12px; color: var(--muted); margin-top: 8px; }
/* Batch edit modal */
.batch-edit-list { max-height: 260px; overflow-y: auto; margin: 8px 0; }
.batch-edit-item {
  display: flex; gap: 8px; align-items: center;
  padding: 6px 8px; border-radius: 6px; border: 1px solid var(--border);
  margin-bottom: 4px;
}
.batch-edit-item input { flex: 1; border: none; background: transparent; font: 13px var(--font-mono); outline: none; color: var(--fg); }
.batch-edit-item input.zh-inp { font-family: var(--font); flex: 0.7; }
.batch-edit-item select { font-size: 11px; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--fg); outline: none; width: 80px; }
.batch-edit-item .remove-btn {
  width: 22px; height: 22px; border-radius: 50%; border: none;
  background: transparent; color: var(--muted); cursor: pointer;
  display: grid; place-items: center; flex-shrink: 0; font-size: 14px;
}
.batch-edit-item .remove-btn:hover { background: oklch(0% 0 0 / 0.06); color: #d32f2f; }

/* Sidebar highlight when in batch mode */
body.batch-active .nav-leaf[href="all-tags.html"] {
  background: oklch(58% 0.18 255 / 0.15);
  box-shadow: inset 3px 0 0 var(--accent);
}

/* Right-side confirm panel */
.confirm-panel {
  display: none;
  position: fixed; top: 56px; right: 0; bottom: 0;
  width: 300px; background: var(--surface);
  border-left: 1px solid var(--border);
  flex-direction: column; z-index: 100;
  box-shadow: -4px 0 20px oklch(0% 0 0 / 0.06);
}
.confirm-panel.open { display: flex; }
.confirm-panel-head {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.confirm-panel-head h3 { font-size: 14px; font-weight: 600; }
.confirm-panel-head .close-btn {
  width: 24px; height: 24px; border-radius: 6px; border: none;
  background: transparent; color: var(--muted); cursor: pointer;
  display: grid; place-items: center;
}
.confirm-panel-head .close-btn:hover { background: oklch(0% 0 0 / 0.06); color: var(--fg); }
.confirm-panel-body { flex: 1; overflow-y: auto; padding: 12px 20px; }
.confirm-panel-body .hint {
  font-size: 12px; color: var(--muted); margin-bottom: 12px; line-height: 1.5;
}
.confirm-panel-item {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; border-radius: 8px;
  background: var(--bg); margin-bottom: 4px;
  border: 1px solid var(--border);
}
.confirm-panel-item .en { font: 600 13px var(--font-mono); }
.confirm-panel-item .zh { font-size: 11px; color: var(--muted); font-family: var(--font); }
.confirm-panel-foot {
  padding: 12px 20px; border-top: 1px solid var(--border);
  display: flex; gap: 8px;
}
.confirm-panel-foot button { flex: 1; justify-content: center; }

/* Edit modal */
.edit-field { margin-bottom: 14px; }
.edit-field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.edit-field input, .edit-field select {
  width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); color: var(--fg); font: 14px var(--font); padding: 8px 12px;
  outline: none; transition: border-color 0.12s;
}
.edit-field input:focus, .edit-field select:focus { border-color: var(--accent); }
.edit-field input.mono { font-family: var(--font-mono); font-weight: 600; }

.all-tags-section { margin-bottom: 32px; }
.all-tags-section h3 {
  font-size: 14px; font-weight: 600; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.all-tags-grid { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.all-tag-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 99px;
  background: var(--surface); border: 1px solid var(--border);
  font: 13px var(--font-mono); color: var(--fg);
  transition: box-shadow 0.12s; cursor: pointer;
}
.all-tag-chip:hover { box-shadow: 0 2px 8px oklch(0% 0 0 / 0.06); border-color: var(--accent-mid); }
.all-tag-chip .tag-en { font-weight: 600; }
.all-tag-chip .tag-zh {
  font-family: var(--font);
  font-size: 11px; color: var(--muted);
  margin-left: 2px;
}
.all-tag-chip .sel-cb { display: none; width: 16px; height: 16px; flex-shrink: 0; border: 1.5px solid var(--border); border-radius: 4px; margin-right: 2px; background: var(--surface); position: relative; transition: all 0.12s; }
.all-tag-chip .sel-cb::after { content: ''; position: absolute; inset: 0; }
.all-tag-chip { cursor: pointer; }
.all-tag-chip .sel-cb { display: none; }
.batch-mode .all-tag-chip { padding-left: 6px; border-color: oklch(0% 0 0 / 0.12); }
.batch-mode .all-tag-chip .sel-cb { display: inline-flex; align-items: center; justify-content: center; }
.batch-mode .all-tag-chip.selected { border-color: var(--accent); background: var(--accent-soft); box-shadow: 0 0 0 1px var(--accent); }
.batch-mode .all-tag-chip.selected .sel-cb { background: var(--accent); border-color: var(--accent); }
.batch-mode .all-tag-chip.selected .sel-cb::after { content: '✓'; color: #fff; font-size: 10px; font-weight: 700; display: grid; place-items: center; }

/* Batch delete bar */
.batch-bar {
  display: none; align-items: center; justify-content: space-between;
  position: sticky; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 12px 24px; margin: 0 -24px -24px;
  z-index: 500; box-shadow: 0 -4px 20px oklch(0% 0 0 / 0.06);
}
.batch-bar.open { display: flex; }
.batch-bar .count { font-size: 13px; font-weight: 600; }
.batch-bar .count span { color: var(--accent); }
.batch-bar .actions { display: flex; gap: 8px; }
.btn-danger {
  display: inline-flex; align-items: center; gap: 6px; height: 36px; padding: 0 18px;
  border-radius: 8px; border: none; background: #d32f2f; color: #fff;
  font: 500 13px var(--font); cursor: pointer; transition: opacity 0.15s;
}
.btn-danger:hover { opacity: 0.85; }
.btn-danger:disabled { opacity: 0.4; cursor: default; }

/* Folder management */
.nav-folder-header .folder-actions {
  margin-left: auto; display: flex; gap: 2px; opacity: 0; transition: opacity 0.12s;
}
.nav-folder-header:hover .folder-actions { opacity: 1; }
.folder-action-btn {
  width: 22px; height: 22px; border-radius: 4px; border: none; background: transparent;
  color: var(--muted); cursor: pointer; display: grid; place-items: center;
  font-size: 14px; line-height: 1; transition: background 0.12s;
}
.folder-action-btn:hover { background: var(--accent-soft); color: var(--accent); }
.folder-action-btn.danger:hover { color: oklch(58% 0.2 30); background: oklch(58% 0.2 30 / 0.08); }
.folder-leaf {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 16px 4px 34px; margin: 1px 6px; border-radius: 6px;
  font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer;
  user-select: none; transition: background 0.12s;
}
.folder-leaf:hover { background: var(--accent-soft); color: var(--fg); }
.folder-leaf .arr { font-size: 8px; transition: transform 0.15s; font-family: monospace; width: 10px; text-align: center; flex-shrink: 0; }
.folder-leaf.open .arr { transform: rotate(90deg); }
.folder-leaf .fname { flex: 1; }
.folder-leaf .folder-actions { display: flex; gap: 1px; opacity: 0; transition: opacity 0.12s; }
.folder-leaf:hover .folder-actions { opacity: 1; }
.folder-children { display: none; }
.folder-leaf.open + .folder-children { display: block; }

@media (max-width: 720px) {
  .sidebar { width: 200px; }
  .tag-chip { font-size: 12px; padding: 4px 10px; }
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      提示词管理
    </h1>
    <button class="sidebar-toggle" onclick="toggleSidebar()" title="收起侧边栏">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-folder open">
      <div class="nav-folder-header" onclick="toggleFolder(this)">
        <span class="arr">▶</span>
        <svg class="ficon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        工作空间
      </div>
      <div class="nav-folder-children">
        <a class="nav-leaf" href="workspace.html">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          我的提示词库
          <span class="count">5 个词组</span>
        </a>
      </div>
    </div>
    <div class="nav-folder open" id="groupsFolder">
      <div class="nav-folder-header" onclick="toggleFolder(this)">
        <span class="arr">▶</span>
        <svg class="ficon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        词组
        <span class="folder-actions">
          <button class="folder-action-btn" onclick="event.stopPropagation();openCreateGroupModal()" title="新建词组">+</button>
          <button class="folder-action-btn" onclick="event.stopPropagation();startInlineCreateFolder()" title="新建目录">📁</button>
        </span>
      </div>
      <div class="nav-folder-children" id="groupSidebar">
        <!-- JS-rendered: groups organized by folders -->
      </div>

<script>
var LS_KEY = 'pt_all_tags_data';
var ALL_GROUPS = [
  { id:'people',        name:'人物肖像',   color:'255' },
  { id:'product',       name:'产品摄影',   color:'170' },
  { id:'illustration',  name:'插画风格',   color:'145' },
  { id:'architecture',  name:'建筑空间',   color:'45' },
  { id:'concept',       name:'概念艺术',   color:'28' },
  { id:'anime',         name:'动漫风格',   color:'300' },
  { id:'food',          name:'美食摄影',   color:'200' }
];

var CATEGORIES = ['角色','画风','构图','光影','画质','场景','色调','表情','姿势','特效'];

/* ===== Folder management ===== */
var GROUP_FOLDERS = [];
var GROUP_FOLDER_MAP = {};
var folderIdCounter = 10;

function loadFolders() {
  try {
    var d = JSON.parse(localStorage.getItem(LS_KEY));
    if (d && d.folders) GROUP_FOLDERS = d.folders;
    if (d && d.folderMap) GROUP_FOLDER_MAP = d.folderMap;
    if (d && d.folderCounter) folderIdCounter = d.folderCounter;
  } catch(_) {}
}
function saveFolders() {
  try {
    var d = JSON.parse(localStorage.getItem(LS_KEY)) || {};
    d.folders = GROUP_FOLDERS;
    d.folderMap = GROUP_FOLDER_MAP;
    d.folderCounter = folderIdCounter;
    d.groups = ALL_GROUPS;
    d.groupFolderMap = GROUP_FOLDER_MAP;
    localStorage.setItem(LS_KEY, JSON.stringify(d));
  } catch(_) {}
}

function renderGroupSidebar() {
  var container = document.getElementById('groupSidebar');
  if (!container) return;
  var html = '';
  var currentGroupId = getCurrentGroupId();
  GROUP_FOLDERS.forEach(function(f) {
    html += '<div class="folder-leaf open">';
    html += '<span class="arr" onclick="toggleFolderChild(this.parentNode)">▶</span>';
    html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
    html += '<span class="fname" id="fname_' + f.id + '" onclick="event.stopPropagation();startRenameFolder(\'' + f.id + '\')" title="点击编辑名称">' + escapeHtml(f.name) + '</span>';
    html += '<span class="folder-actions">';
    html += '<button class="folder-action-btn" onclick="event.stopPropagation();openCreateGroupModal(\'' + f.id + '\')" title="在此目录下新建词组">+</button>';
    html += '<button class="folder-action-btn rename-btn" onclick="event.stopPropagation();startRenameFolder(\'' + f.id + '\')" title="重命名">✏️</button>';
    html += '<button class="folder-action-btn danger" onclick="event.stopPropagation();deleteFolder(\'' + f.id + '\')" title="删除目录">×</button>';
    html += '</span>';
    html += '</div>';
    html += '<div class="folder-children">';
    ALL_GROUPS.forEach(function(g) {
      if (GROUP_FOLDER_MAP[g.id] === f.id) {
        var count = (GROUP_TAGS[g.id] || []).length;
        var active = g.id === currentGroupId ? ' active' : '';
        html += '<a class="nav-leaf' + active + '" href="group.html?id=' + g.id + '">';
        html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
        html += escapeHtml(g.name) + ' <span class="count">' + count + '</span></a>';
      }
    });
    html += '</div>';
  });
  ALL_GROUPS.forEach(function(g) {
    if (!GROUP_FOLDER_MAP[g.id]) {
      var count = (GROUP_TAGS[g.id] || []).length;
      var active = g.id === currentGroupId ? ' active' : '';
      html += '<a class="nav-leaf' + active + '" href="group.html?id=' + g.id + '">';
      html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
      html += escapeHtml(g.name) + ' <span class="count">' + count + '</span></a>';
    }
  });
  if (_inlineCreatingFolder) {
    html += '<div class="nav-leaf inline-create">';
    html += '<input id="inlineFolderInput" placeholder="文件夹名称…" onkeydown="if(event.key===\'Enter\')confirmInlineCreateFolder();else if(event.key===\'Escape\')cancelInlineCreateFolder()" onblur="setTimeout(confirmInlineCreateFolder,150)" />';
    html += '</div>';
  }
  container.innerHTML = html;
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toggleFolderChild(el) { el.classList.toggle('open'); }

/* Folder inline rename */
var _renamingFolder = null;
var _inlineCreatingFolder = false;

function startRenameFolder(folderId) {
  var span = document.getElementById('fname_' + folderId);
  if (!span) return;
  if (_renamingFolder) cancelRenameFolder();
  _renamingFolder = folderId;
  var oldName = span.textContent;
  var input = document.createElement('input');
  input.className = 'fname-input';
  input.type = 'text';
  input.value = oldName;
  input.id = 'fname_input_' + folderId;
  input.onkeydown = function(e) {
    e.stopPropagation();
    if (e.key === 'Enter') { saveRenameFolder(folderId); }
    else if (e.key === 'Escape') { cancelRenameFolder(); }
  };
  input.onblur = function() { saveRenameFolder(folderId); };
  input.dataset.oldName = oldName;
  span.innerHTML = '';
  span.appendChild(input);
  input.focus();
  input.select();
}
function saveRenameFolder(folderId) {
  var input = document.getElementById('fname_input_' + folderId);
  if (!input || _renamingFolder !== folderId) return;
  var newName = input.value.trim();
  var oldName = input.dataset.oldName || '';
  _renamingFolder = null;
  if (newName && newName !== oldName) {
    GROUP_FOLDERS.forEach(function(f) {
      if (f.id === folderId) f.name = newName;
    });
    saveFolders();
  }
  renderGroupSidebar();
}
function cancelRenameFolder() {
  if (_renamingFolder) {
    _renamingFolder = null;
    renderGroupSidebar();
  }
}

function openCreateGroupModal(preSelectedFolder) {
  var sel = document.getElementById('newGroupFolder');
  sel.innerHTML = '<option value="">（无目录 — 放在根目录）</option>';
  GROUP_FOLDERS.forEach(function(f) {
    sel.innerHTML += '<option value="' + f.id + '">' + escapeHtml(f.name) + '</option>';
  });
  if (preSelectedFolder) sel.value = preSelectedFolder;
  document.getElementById('newGroupName').value = '';
  document.getElementById('newGroupName').focus();
  document.getElementById('createGroupModal').classList.add('open');
}
function confirmCreateGroup() {
  var name = document.getElementById('newGroupName').value.trim();
  if (!name) return;
  var folderId = document.getElementById('newGroupFolder').value || null;
  var id = name.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]+/g, '_').replace(/^_|_$/g, '') || 'group_' + Date.now();
  var base = id, n = 0;
  while (ALL_GROUPS.some(function(g) { return g.id === id; })) { n++; id = base + '_' + n; }
  var hue = String(Math.floor(Math.random() * 360));
  ALL_GROUPS.push({ id: id, name: name, color: hue, tags: '0', desc: '' });
  if (folderId) GROUP_FOLDER_MAP[id] = folderId;
  if (!GROUP_TAGS[id]) GROUP_TAGS[id] = [];
  saveData();
  saveFolders();
  renderGroupSidebar();
  location.href = 'group.html?id=' + id;
}
function startInlineCreateFolder() {
  if (_inlineCreatingFolder) return;
  _inlineCreatingFolder = true;
  renderGroupSidebar();
  setTimeout(function() {
    var inp = document.getElementById('inlineFolderInput');
    if (inp) { inp.focus(); inp.select(); }
  }, 50);
}
function confirmInlineCreateFolder() {
  var input = document.getElementById('inlineFolderInput');
  if (!input) return;
  var name = input.value.trim();
  _inlineCreatingFolder = false;
  if (name) {
    var id = 'f' + (folderIdCounter++);
    GROUP_FOLDERS.push({ id: id, name: name });
    saveFolders();
  }
  renderGroupSidebar();
}
function cancelInlineCreateFolder() {
  _inlineCreatingFolder = false;
  renderGroupSidebar();
}
function deleteFolder(folderId) {
  if (!confirm('确认删除目录 "' + (GROUP_FOLDERS.find(function(f){return f.id===folderId})||{}).name + '"？目录下的词组将移至根目录。')) return;
  GROUP_FOLDERS = GROUP_FOLDERS.filter(function(f) { return f.id !== folderId; });
  for (var gid in GROUP_FOLDER_MAP) {
    if (GROUP_FOLDER_MAP[gid] === folderId) delete GROUP_FOLDER_MAP[gid];
  }
  saveFolders();
  renderGroupSidebar();
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

var DEFAULT_GROUP_TAGS = {
  people:        ['t01','t02','t03','t04','t05','t13','t14','t15','t16'],
  product:       ['t06','t07','t09','t11','t17','t27'],
  illustration:  ['t08','t10','t11','t12','t09'],
  architecture:  ['t17','t27','t28','t29','t31','t32'],
  concept:       ['t10','t18','t20','t22','t35'],
  anime:         ['t03','t04','t06','t12','t08'],
  food:          ['t13','t19','t23','t24','t27','t28','t33']
};

var ALL_TAGS, GROUP_TAGS;
var tagIdCounter = 100;
var selectedCategory = null;

function loadData() {
  var saved = null;
  try { saved = JSON.parse(localStorage.getItem(LS_KEY)); } catch (_) {}
  if (saved && saved.tags && saved.groupTags) {
    ALL_TAGS = saved.tags;
    GROUP_TAGS = saved.groupTags;
    tagIdCounter = saved.counter || 100;
    if (saved.groups) { ALL_GROUPS = saved.groups; }
    if (saved.groupFolderMap) { GROUP_FOLDER_MAP = saved.groupFolderMap; }
  } else {
    ALL_TAGS = DEFAULT_TAGS.map(function(t) { return JSON.parse(JSON.stringify(t)); });
    GROUP_TAGS = {};
    for (var g in DEFAULT_GROUP_TAGS) {
      GROUP_TAGS[g] = DEFAULT_GROUP_TAGS[g].slice();
    }
  }
}

function saveData() {
  try {
    var d = JSON.parse(localStorage.getItem(LS_KEY)) || {};
    d.tags = ALL_TAGS;
    d.groupTags = GROUP_TAGS;
    d.counter = tagIdCounter;
    d.groups = ALL_GROUPS;
    d.groupFolderMap = GROUP_FOLDER_MAP;
    localStorage.setItem(LS_KEY, JSON.stringify(d));
  } catch (_) {}
}

function generateTagId(en) {
  var safe = en.replace(/[^a-zA-Z0-9\u4e00-\u9fff_-]/g, '_').toLowerCase();
  if (!safe) safe = 'tag';
  return safe + '-' + (tagIdCounter++);
}

function getTagGroups(tagId) {
  var result = [];
  for (var g in GROUP_TAGS) {
    if (GROUP_TAGS[g].indexOf(tagId) !== -1) {
      result.push(g);
    }
  }
  return result;
}

function render() {
  var q = document.getElementById('searchInput').value.toLowerCase().trim();
  var grid = document.getElementById('tagGrid');
  var totalEl = document.getElementById('statTotal');
  var groupsEl = document.getElementById('statGroups');
  var selectedEl = document.getElementById('statSelected');
  var filterBar = document.getElementById('filterBar');

  var filtered = ALL_TAGS.filter(function(t) {
    if (selectedCategory && t.category !== selectedCategory) return false;
    if (q) {
      return t.en.toLowerCase().indexOf(q) !== -1 ||
             t.zh.toLowerCase().indexOf(q) !== -1 ||
             (t.category || '').toLowerCase().indexOf(q) !== -1;
    }
    return true;
  });

  // Group by category
  var categoryMap = {};
  filtered.forEach(function(t) {
    var cat = t.category || '未分类';
    if (!categoryMap[cat]) categoryMap[cat] = [];
    categoryMap[cat].push({ tag: t });
  });

  var batchMode = isBatchMode();
  var html = '';
  var catOrder = ['角色','画风','构图','光影','画质','场景','色调','表情','姿势','特效','未分类'];
  var sortedCats = Object.keys(categoryMap).sort(function(a, b) {
    var ia = catOrder.indexOf(a);
    var ib = catOrder.indexOf(b);
    if (ia === -1) ia = 999;
    if (ib === -1) ib = 999;
    return ia - ib;
  });
  sortedCats.forEach(function(cat) {
    var items = categoryMap[cat];
    html += '<div class="all-tags-section">';
    html += '  <h3>' + cat + ' <span style="font-size:12px;font-weight:400;color:var(--muted)">' + items.length + ' 个</span></h3>';
    html += '  <div class="all-tags-grid">';
    items.forEach(function(item) {
      var selClass = batchMode && isSelected(item.tag.id) ? ' selected' : '';
      html += '    <span class="all-tag-chip' + selClass + '" title="' + item.tag.zh + '" onclick="' + (batchMode ? 'toggleSelect(\'' + item.tag.id + '\')' : '') + '" ondblclick="' + (batchMode ? '' : 'openEditTag(\'' + item.tag.id + '\')') + '">';
      html += '      <span class="sel-cb"></span>';
      html += '      <span class="tag-en">' + item.tag.en + '</span>';
      html += '      <span class="tag-zh">(' + item.tag.zh + ')</span>';
      html += '    </span>';
    });
    html += '  </div>';
    html += '</div>';
  });
  grid.innerHTML = html || '<div style="color:var(--muted);padding:40px 0;text-align:center;width:100%">没有匹配的提示词</div>';

  totalEl.textContent = ALL_TAGS.length;
  var groupSet = {};
  for (var gid in GROUP_TAGS) { groupSet[gid] = true; }
  groupsEl.textContent = Object.keys(groupSet).length;
  selectedEl.textContent = filtered.length;
  document.getElementById('totalTagCount').textContent = ALL_TAGS.length;

  renderGroupSidebar();

  var fhtml = '<span class="filter-chip' + (selectedCategory === null ? ' active' : '') + '" onclick="selectCategory(null)">全部分类</span>';
  for (var i2 = 0; i2 < CATEGORIES.length; i2++) {
    var cat = CATEGORIES[i2];
    fhtml += '<span class="filter-chip' + (selectedCategory === cat ? ' active' : '') + '" onclick="selectCategory(\'' + cat + '\')">' + cat + '</span>';
  }
  filterBar.innerHTML = fhtml;
}

function selectCategory(cat) {
  selectedCategory = cat;
  render();
}

/* — Batch add — */
var batchWords = [];

function previewBatchWords() {
  var input = document.getElementById('batchAddInput').value;
  var raw = input.split(/[\n,，]+/).map(function(w) { return w.trim(); }).filter(function(w) { return w.length > 0; });
  batchWords = [];
  var seen = {};
  raw.forEach(function(w) {
    var lower = w.toLowerCase();
    if (!seen[lower]) { seen[lower] = true; batchWords.push(w); }
  });
  var chips = document.getElementById('batchPreviewChips');
  var html = '';
  batchWords.forEach(function(w) {
    var exists = false;
    for (var i = 0; i < ALL_TAGS.length; i++) { if (ALL_TAGS[i].en === w) { exists = true; break; } }
    html += '<span class="prev-chip" style="' + (exists ? 'opacity:0.4;text-decoration:line-through' : '') + '">' + w + '</span>';
  });
  chips.innerHTML = html;
  document.getElementById('batchPreviewCount').textContent = '解析到 ' + batchWords.length + ' 个单词（划线 = 已存在）';
  var btn = document.getElementById('addBatchConfirm');
  btn.textContent = '新增 ' + batchWords.length + ' 个';
  btn.disabled = batchWords.length === 0;
}

var batchEditData = [];
function showEditBatchPreview() {
  if (batchWords.length === 0) return;
  batchEditData = batchWords.map(function(w) {
    var existing = null;
    for (var i = 0; i < ALL_TAGS.length; i++) { if (ALL_TAGS[i].en === w) { existing = ALL_TAGS[i]; break; } }
    return { en: w, zh: existing ? existing.zh : '', category: existing ? (existing.category || '') : '' };
  });
  renderBatchEditList();
  document.getElementById('batchAddModal').classList.remove('open');
  document.getElementById('batchEditModal').classList.add('open');
}

function renderBatchEditList() {
  var list = document.getElementById('batchEditList');
  var html = '';
  batchEditData.forEach(function(item, i) {
    html += '<div class="batch-edit-item">';
    html += '  <input class="en-inp" value="' + item.en.replace(/"/g, '&quot;') + '" readonly style="flex:0.8;font-weight:600" />';
    html += '  <input class="zh-inp" value="' + item.zh.replace(/"/g, '&quot;') + '" placeholder="中文" oninput="batchEditData[' + i + '].zh=this.value" />';
    html += '  <select onchange="batchEditData[' + i + '].category=this.value">';
    html += '    <option value="">未分类</option>';
    for (var ci = 0; ci < CATEGORIES.length; ci++) {
      var sel = item.category === CATEGORIES[ci] ? ' selected' : '';
      html += '    <option' + sel + '>' + CATEGORIES[ci] + '</option>';
    }
    html += '  </select>';
    html += '  <button class="remove-btn" onclick="removeBatchItem(' + i + ')">×</button>';
    html += '</div>';
  });
  list.innerHTML = html;
}

function removeBatchItem(idx) {
  batchEditData.splice(idx, 1);
  renderBatchEditList();
}

function closeBatchAddModal() { document.getElementById('batchAddModal').classList.remove('open'); }
function closeBatchEditModal() {
  document.getElementById('batchEditModal').classList.remove('open');
  document.getElementById('batchAddModal').classList.add('open');
}

function confirmBatchAdd() {
  var added = 0;
  batchWords.forEach(function(w) {
    var exists = false;
    for (var i = 0; i < ALL_TAGS.length; i++) { if (ALL_TAGS[i].en === w) { exists = true; break; } }
    if (!exists) {
      ALL_TAGS.push({ id: generateTagId(w), en: w, zh: '', category: '' });
      added++;
    }
  });
  saveData();
  closeBatchAddModal();
  render();
}

function confirmEditBatchAdd() {
  var added = 0;
  batchEditData.forEach(function(item) {
    var exists = false;
    for (var i = 0; i < ALL_TAGS.length; i++) { if (ALL_TAGS[i].en === item.en) { exists = true; break; } }
    if (!exists) {
      ALL_TAGS.push({ id: generateTagId(item.en), en: item.en, zh: item.zh, category: item.category });
      added++;
    }
  });
  saveData();
  closeBatchEditModal();
  render();
}

function openBatchAddModal() {
  document.getElementById('batchAddInput').value = '';
  batchWords = [];
  document.getElementById('batchPreviewChips').innerHTML = '';
  document.getElementById('batchPreviewCount').textContent = '解析到 0 个单词';
  document.getElementById('addBatchConfirm').textContent = '新增 0 个';
  document.getElementById('addBatchConfirm').disabled = true;
  document.getElementById('batchAddModal').classList.add('open');
  setTimeout(function() { document.getElementById('batchAddInput').focus(); }, 100);
}

document.getElementById('batchAddModal').addEventListener('click', function(e) {
  if (e.target === this) closeBatchAddModal();
});
document.getElementById('batchEditModal').addEventListener('click', function(e) {
  if (e.target === this) closeBatchEditModal();
});

document.getElementById('batchAddInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.ctrlKey) showEditBatchPreview();
});

/* — Edit tag — */
function openEditTag(id) {
  var tag = null;
  for (var i = 0; i < ALL_TAGS.length; i++) {
    if (ALL_TAGS[i].id === id) { tag = ALL_TAGS[i]; break; }
  }
  if (!tag) return;
  document.getElementById('editTagId').value = id;
  document.getElementById('editEn').value = tag.en;
  document.getElementById('editZh').value = tag.zh;
  document.getElementById('editCategory').value = tag.category || '';
  document.getElementById('editEn').focus();
  document.getElementById('editEn').select();
  document.getElementById('editModal').classList.add('open');
}
function closeEditModal() { document.getElementById('editModal').classList.remove('open'); }
function saveEditTag() {
  var id = document.getElementById('editTagId').value;
  var tag = null;
  for (var i = 0; i < ALL_TAGS.length; i++) {
    if (ALL_TAGS[i].id === id) { tag = ALL_TAGS[i]; break; }
  }
  if (!tag) return;
  var en = document.getElementById('editEn').value.trim();
  if (!en) { alert('英文单词不能为空'); return; }
  tag.en = en;
  tag.zh = document.getElementById('editZh').value.trim();
  tag.category = document.getElementById('editCategory').value;
  saveData();
  render();
  closeEditModal();
}

document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});
document.getElementById('editEn').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') saveEditTag();
});
document.getElementById('editZh').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') saveEditTag();
});

/* — Batch delete — */
var selectedIds = {};

function isBatchMode() {
  return document.getElementById('batchBar').classList.contains('open');
}

function isSelected(id) { return !!selectedIds[id]; }

function toggleSelect(id) {
  if (selectedIds[id]) {
    delete selectedIds[id];
  } else {
    selectedIds[id] = true;
  }
  updateBatchBar();
  render();
}

function updateBatchBar() {
  var bar = document.getElementById('batchBar');
  var count = Object.keys(selectedIds).length;
  document.getElementById('selCount').textContent = count;
  document.getElementById('delBtnCount').textContent = count;
  document.getElementById('delBtn').disabled = count === 0;
}

function toggleBatchDelete() {
  var bar = document.getElementById('batchBar');
  var grid = document.getElementById('tagGrid');
  if (bar.classList.contains('open')) {
    bar.classList.remove('open');
    grid.classList.remove('batch-mode');
    document.body.classList.remove('batch-active');
  } else {
    if (bar.classList.contains('open')) return;
    selectedIds = {};
    bar.classList.add('open');
    grid.classList.add('batch-mode');
    document.body.classList.add('batch-active');
    render();
  }
  updateBatchBar();
}

function clearSelection() {
  selectedIds = {};
  document.getElementById('tagGrid').classList.remove('batch-mode');
  document.body.classList.remove('batch-active');
  var bar = document.getElementById('batchBar');
  bar.classList.remove('open');
  render();
}

function openConfirmPanel() {
  var count = Object.keys(selectedIds).length;
  if (count === 0) return;
  document.getElementById('confirmCount').textContent = count;
  document.getElementById('confirmCount2').textContent = count;

  var listHtml = '';
  Object.keys(selectedIds).forEach(function(id) {
    for (var i = 0; i < ALL_TAGS.length; i++) {
      if (ALL_TAGS[i].id === id) {
        listHtml += '<div class="confirm-panel-item"><span class="en">' + ALL_TAGS[i].en + '</span> <span class="zh">(' + ALL_TAGS[i].zh + ')</span></div>';
        break;
      }
    }
  });
  document.getElementById('confirmDeleteList').innerHTML = listHtml;
  document.getElementById('confirmPanel').classList.add('open');
}

function closeConfirmPanel() {
  document.getElementById('confirmPanel').classList.remove('open');
}

function confirmBatchDelete() {
  var ids = Object.keys(selectedIds);
  if (ids.length === 0) return;

  // Remove from ALL_TAGS
  var idSet = {};
  ids.forEach(function(id) { idSet[id] = true; });
  ALL_TAGS = ALL_TAGS.filter(function(t) { return !idSet[t.id]; });

  // Remove from GROUP_TAGS
  for (var g in GROUP_TAGS) {
    GROUP_TAGS[g] = GROUP_TAGS[g].filter(function(tagId) { return !idSet[tagId]; });
  }

  saveData();
  selectedIds = {};
  closeConfirmPanel();
  document.getElementById('batchBar').classList.remove('open');
  document.getElementById('tagGrid').classList.remove('batch-mode');
  document.body.classList.remove('batch-active');
  render();
}

function toggleFolder(el) { el.parentElement.classList.toggle('open'); }
function toggleSidebar() {
  var s = document.querySelector('.sidebar');
  if (s.classList.contains('collapsed')) {
    openSidebarPopout();
  } else {
    closeSidebarPopout();
  }
}
function openSidebarPopout() {
  var s = document.querySelector('.sidebar');
  s.classList.remove('collapsed');
  document.body.classList.add('sidebar-locked');
}
function closeSidebarPopout() {
  var s = document.querySelector('.sidebar');
  s.classList.add('collapsed');
  s.classList.add('no-trans');
  document.body.classList.remove('sidebar-locked');
  try { localStorage.setItem('pm_sidebar_collapsed', '1'); } catch(e) {}
  setTimeout(function() { s.classList.remove('no-trans'); }, 50);
}

loadData();
loadFolders();
renderGroupSidebar();
render();
try {
  if (localStorage.getItem('pm_sidebar_collapsed') === '1') {
    document.querySelector('.sidebar').classList.add('collapsed');
  }
} catch(e) {}
</script>
